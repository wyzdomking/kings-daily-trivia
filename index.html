<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Trivia</title>

<link rel="stylesheet" href="style.css">

<!-- Simple readable font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

<script src="script.js" defer></script>

</head>

<body id="pageBody">

<header id="titleScreen">

<!-- MUSIC (add your file here) -->
<!-- <audio src="music.mp3" autoplay loop></audio> -->

<button id="PLAY">PLAY</button>
</header>

<!-- GAME AREA -->
<main id="game" class="hidden">

<div id="question"></div>

<div id="boxes"></div>

<input id="answerInput" autocomplete="off" placeholder="Type answer...">

<div class="buttons">

<button id="submitBtn">SUBMIT</button>

<button id="hintBtn">HINT</button>

</div>

<div id="hint"></div>

<div id="message"></div>

</main>

<!-- FINAL SCREEN -->
<section id="finalScreen" class="hidden">

<h1 id="finalPhrase"></h1>

<!-- hearts container -->
<div id="hearts"></div>

<!-- VIDEO PLACEHOLDER -->
<video id="video" controls>
<source src="video.mp4" type="video/mp4">
</video>

</section>

</body>
</html>
